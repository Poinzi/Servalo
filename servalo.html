<!doctype html>
<html lang="fi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>Servalo – Huoltohallinta</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap');

:root{
  --orange:#0d9488;
  --orange-d:#0b7a70;
  --orange-l:#d6efeb;
  --navy:#0f2b30;
  --navy-2:#173a40;
  --bg:#eef2f1;
  --card:#ffffff;
  --line:#dde6e3;
  --text:#0f2b30;
  --muted:#5b7177;
  --red:#e2574c;
  --red-l:#fde8e6;
  --green:#16a06b;
  --green-l:#e1f5ec;
  --yellow:#f6c343;
  --shadow:0 6px 20px rgba(15,43,48,.07);
}

*{box-sizing:border-box}
html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Manrope',system-ui,sans-serif;font-size:14px;line-height:1.45}
a{color:var(--orange);text-decoration:none}
button{font-family:inherit;cursor:pointer}
input,select,textarea{font-family:inherit;font-size:14px;color:var(--text)}
.hidden{display:none !important}

/* Top bar */
.topbar{position:sticky;top:0;z-index:50;background:var(--navy);color:#fff;display:flex;align-items:center;gap:18px;padding:10px 18px;box-shadow:0 2px 6px rgba(0,0,0,.15)}
.brand{display:flex;align-items:center;gap:10px}
.brand .logo{width:34px;height:34px}
.brand .name{font-weight:800;letter-spacing:.5px;font-size:18px}
.brand .tag{font-size:10px;letter-spacing:2px;color:#a9c3c1;display:block;margin-top:-2px}
.nav{display:flex;gap:4px;margin-left:18px;flex-wrap:wrap}
.nav button{background:transparent;border:0;color:#cfdedb;padding:8px 12px;border-radius:8px;font-weight:600;font-size:13px}
.nav button:hover{background:rgba(255,255,255,.08);color:#fff}
.nav button.active{background:var(--orange);color:#fff}
.spacer{flex:1}
.userchip{display:flex;align-items:center;gap:10px;background:rgba(255,255,255,.08);padding:6px 10px;border-radius:30px}
.userchip .avatar{width:28px;height:28px;border-radius:50%;background:var(--orange);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:12px}
.userchip .who{font-size:12px;line-height:1.1}
.userchip .who small{display:block;color:#a9c3c1;font-size:10px;text-transform:uppercase;letter-spacing:1px}
.userchip button{background:transparent;border:1px solid rgba(255,255,255,.2);color:#fff;padding:4px 8px;border-radius:6px;font-size:11px}
.userchip button:hover{background:rgba(255,255,255,.1)}
.menu-toggle{display:none;background:transparent;border:0;color:#fff;font-size:22px;padding:4px 8px}

/* Layout */
.layout{display:grid;grid-template-columns:280px 1fr;min-height:calc(100vh - 56px)}
.sidebar{background:#fff;border-right:1px solid var(--line);padding:14px;overflow-y:auto}
.sidebar h4{margin:0 0 8px;font-size:11px;letter-spacing:1.5px;color:var(--muted);text-transform:uppercase}
.sidebar .search{width:100%;border:1px solid var(--line);border-radius:8px;padding:8px 10px;margin-bottom:12px}
.tree{font-size:13px}
.tree .node{padding:4px 4px 4px 10px;border-radius:6px;cursor:pointer;display:flex;justify-content:space-between;align-items:center;gap:6px}
.tree .node:hover{background:#f1f6f5}
.tree .node.active{background:var(--orange-l);color:var(--orange-d);font-weight:700}
.tree .node .count{background:#eef2f1;color:var(--muted);font-size:10px;padding:1px 6px;border-radius:10px;font-weight:600}
.tree .lvl-1{padding-left:10px;font-weight:700;color:var(--navy)}
.tree .lvl-2{padding-left:22px}
.tree .lvl-3{padding-left:36px;color:var(--muted)}
.main{padding:18px;overflow-x:hidden}

/* Cards & panels */
.card{background:var(--card);border-radius:14px;box-shadow:var(--shadow);padding:16px;margin-bottom:16px;border-left:4px solid var(--orange)}
.panel{background:var(--card);border-radius:14px;box-shadow:var(--shadow);margin-bottom:16px;overflow:hidden;border-left:4px solid var(--orange)}
.panel .head{background:var(--orange-l);color:var(--orange-d);font-weight:700;padding:10px 14px;display:flex;justify-content:space-between;align-items:center}
.panel .head .actions{display:flex;gap:6px}
.panel .body{padding:14px}

/* Buttons */
.btn{display:inline-flex;align-items:center;gap:6px;background:var(--orange);color:#fff;border:0;padding:8px 14px;border-radius:8px;font-weight:600;font-size:13px;text-decoration:none}
.btn:hover{background:var(--orange-d)}
.btn.ghost{background:#fff;color:var(--orange-d);border:1px solid var(--orange)}
.btn.ghost:hover{background:var(--orange-l)}
.btn.sm{padding:5px 10px;font-size:12px}
.btn.danger{background:var(--red)}
.btn.danger:hover{background:#c64438}
.btn.muted{background:#eaf0ee;color:var(--text)}
.btn.muted:hover{background:#dde7e4}

/* Forms */
.form-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
.form-row.one{grid-template-columns:1fr}
.form-row.three{grid-template-columns:1fr 1fr 1fr}
.field label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin-bottom:4px;font-weight:700}
.field input,.field select,.field textarea{width:100%;border:1px solid var(--line);border-radius:8px;padding:8px 10px;background:#fff}
.field textarea{min-height:70px;resize:vertical}

/* Stat cards */
.stats{display:grid;grid-template-columns:repeat(4,1fr);gap:12px;margin-bottom:16px}
.stat{background:#fff;border-radius:12px;padding:14px;box-shadow:var(--shadow);border-left:4px solid var(--orange)}
.stat .lbl{font-size:11px;color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-weight:700}
.stat .val{font-size:24px;font-weight:800;color:var(--navy);margin-top:6px}
.stat.red{border-color:var(--red)} .stat.red .val{color:var(--red)}
.stat.green{border-color:var(--green)} .stat.green .val{color:var(--green)}
.stat.yellow{border-color:var(--yellow)} .stat.yellow .val{color:#9a7a14}

/* Tables */
table.tbl{width:100%;border-collapse:collapse;background:#fff;border-radius:10px;overflow:hidden}
table.tbl th{background:#f4f8f7;text-align:left;padding:8px 10px;font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);border-bottom:1px solid var(--line)}
table.tbl td{padding:8px 10px;border-bottom:1px solid var(--line);font-size:13px;vertical-align:top}
table.tbl tr:hover{background:#f7fbfa}
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:11px;font-weight:700;background:#eef2f1;color:var(--muted)}
.tag.red{background:var(--red-l);color:var(--red)}
.tag.green{background:var(--green-l);color:var(--green)}
.tag.yellow{background:#fdf3d4;color:#9a7a14}
.tag.blue{background:#e2eef6;color:#23618c}

/* Toolbar */
.toolbar{display:flex;flex-wrap:wrap;gap:8px;align-items:center;margin-bottom:12px}
.toolbar input.search{border:1px solid var(--line);border-radius:8px;padding:7px 10px;min-width:220px}
.toolbar select{border:1px solid var(--line);border-radius:8px;padding:7px 10px;background:#fff}
.toolbar .seg{display:inline-flex;background:#fff;border:1px solid var(--line);border-radius:8px;overflow:hidden}
.toolbar .seg button{background:transparent;border:0;padding:7px 12px;font-weight:600;color:var(--muted)}
.toolbar .seg button.active{background:var(--orange);color:#fff}

/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:14px;border-bottom:1px solid var(--line);flex-wrap:wrap}
.tabs button{background:transparent;border:0;padding:9px 14px;color:var(--muted);font-weight:700;font-size:13px;border-bottom:3px solid transparent}
.tabs button.active{color:var(--orange);border-bottom-color:var(--orange)}

/* KV grid */
.kv{display:grid;grid-template-columns:1fr 1fr;gap:0}
.kv .row{display:grid;grid-template-columns:180px 1fr;padding:7px 10px;border-bottom:1px solid var(--line);font-size:13px}
.kv .row b{color:var(--muted);font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.5px}
.kv .row span{color:var(--text)}

/* Alert banner */
.alert{background:var(--red-l);color:var(--red);border-left:4px solid var(--red);padding:10px 14px;border-radius:10px;margin-bottom:12px;font-weight:600;display:flex;align-items:center;gap:10px}
.alert.green{background:var(--green-l);color:var(--green);border-color:var(--green)}

/* Modal */
.modal-back{position:fixed;inset:0;background:rgba(15,43,48,.45);display:none;align-items:center;justify-content:center;z-index:100;padding:20px}
.modal-back.open{display:flex}
.modal{background:#fff;border-radius:14px;max-width:680px;width:100%;max-height:90vh;overflow-y:auto;padding:20px;box-shadow:0 20px 60px rgba(0,0,0,.3)}
.modal h3{margin:0 0 12px;color:var(--navy)}
.modal .close{float:right;background:transparent;border:0;font-size:22px;color:var(--muted)}

/* Login */
.login-wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;background:linear-gradient(135deg,var(--navy),#1c4147);padding:24px}
.login{background:#fff;border-radius:18px;padding:30px;max-width:520px;width:100%;box-shadow:0 30px 60px rgba(0,0,0,.35)}
.login .head{text-align:center;margin-bottom:18px}
.login .head .logo{width:54px;height:54px}
.login .head h1{margin:8px 0 0;color:var(--navy)}
.login .head small{color:var(--muted);letter-spacing:3px;font-weight:700}
.user-card{display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--line);border-radius:10px;margin-bottom:8px;cursor:pointer;transition:all .15s}
.user-card:hover{border-color:var(--orange);background:#f7fbfa}
.user-card .avatar{width:42px;height:42px;border-radius:50%;background:var(--orange);color:#fff;display:flex;align-items:center;justify-content:center;font-weight:700}
.user-card .meta{flex:1}
.user-card .meta b{display:block;color:var(--navy)}
.user-card .meta small{color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-size:11px}

/* Donut chart */
.donut-wrap{display:flex;align-items:center;gap:20px;flex-wrap:wrap}
.donut{position:relative;width:180px;height:180px}
.donut .label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.donut .label b{font-size:22px;color:var(--navy)}
.donut .label small{color:var(--muted);text-transform:uppercase;letter-spacing:1px;font-size:10px}
.legend{flex:1;min-width:180px}
.legend .item{display:flex;align-items:center;gap:8px;padding:4px 0;font-size:13px}
.legend .sw{width:12px;height:12px;border-radius:3px}

/* Task / device cards */
.grid-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:12px}
.mini-card{background:#fff;border-radius:12px;padding:14px;box-shadow:var(--shadow);border-left:4px solid var(--orange)}
.mini-card h4{margin:0 0 6px;color:var(--navy)}
.mini-card .row{display:flex;justify-content:space-between;font-size:12px;color:var(--muted);padding:3px 0}
.mini-card .row b{color:var(--text);font-weight:600}
.mini-card.red{border-color:var(--red)}
.mini-card.green{border-color:var(--green)}
.mini-card.yellow{border-color:var(--yellow)}
.mini-card .actions{margin-top:10px;display:flex;gap:6px;flex-wrap:wrap}

/* Customer cards */
.cust-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(300px,1fr));gap:12px}
.cust-card{background:#fff;border-radius:12px;box-shadow:var(--shadow);overflow:hidden;border-left:4px solid var(--orange);cursor:pointer}
.cust-card .hd{padding:14px;border-bottom:1px solid var(--line)}
.cust-card .hd b{display:block;color:var(--navy);font-size:15px}
.cust-card .hd small{color:var(--muted)}
.cust-card .bd{padding:10px 14px;font-size:12px;color:var(--muted);display:flex;justify-content:space-between}

/* Print styles handled in window.open */
@media (max-width: 880px){
  .layout{grid-template-columns:1fr}
  .sidebar{display:none;position:fixed;inset:56px 0 0 0;width:100%;z-index:40}
  .sidebar.open{display:block}
  .menu-toggle{display:inline-block}
  .nav{display:none}
  .nav.open{display:flex;position:absolute;top:56px;left:0;right:0;background:var(--navy);padding:8px;flex-direction:column;z-index:30}
  .stats{grid-template-columns:repeat(2,1fr)}
  .form-row,.form-row.three{grid-template-columns:1fr}
  .kv{grid-template-columns:1fr}
  .kv .row{grid-template-columns:1fr;gap:2px}
}
</style>
</head>
<body>

<!-- =========== LOGIN VIEW =========== -->
<div id="view-login" class="view login-wrap hidden">
  <div class="login">
    <div class="head">
      <svg class="logo" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
        <path d="M32 4 L58 14 V32 C58 48 46 58 32 62 C18 58 6 48 6 32 V14 Z" fill="#0d9488"/>
        <path d="M32 8 L54 16 V32 C54 46 44 54 32 58 C20 54 10 46 10 32 V16 Z" fill="#0f2b30"/>
        <path d="M22 32 L29 39 L43 24" stroke="#0d9488" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
      <h1>Servalo</h1>
      <small>HUOLTOHALLINTA</small>
    </div>
    <p style="text-align:center;color:var(--muted);margin-bottom:18px">Valitse käyttäjä jatkaaksesi (demo-kirjautuminen)</p>
    <div id="login-users"></div>
  </div>
</div>

<!-- =========== APP =========== -->
<div id="app" class="hidden">

<div class="topbar">
  <button class="menu-toggle" onclick="document.getElementById('sidebar').classList.toggle('open');document.getElementById('mainnav').classList.toggle('open')">≡</button>
  <div class="brand">
    <svg class="logo" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
      <path d="M32 4 L58 14 V32 C58 48 46 58 32 62 C18 58 6 48 6 32 V14 Z" fill="#0d9488"/>
      <path d="M32 8 L54 16 V32 C54 46 44 54 32 58 C20 54 10 46 10 32 V16 Z" fill="#173a40"/>
      <path d="M22 32 L29 39 L43 24" stroke="#0d9488" stroke-width="4" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <div>
      <span class="name">Servalo</span>
      <span class="tag">HUOLTOHALLINTA</span>
    </div>
  </div>
  <div class="nav" id="mainnav">
    <button data-nav="devices" onclick="go('devices')">Laitteet</button>
    <button data-nav="reports" onclick="go('reports')">Raportit</button>
    <button data-nav="assignment" onclick="go('assignment')">Työnjako</button>
    <button data-nav="customers" onclick="go('customers')">Asiakkaat</button>
    <button data-nav="mywork" onclick="go('mywork')">Omat työt</button>
    <button data-nav="admin" onclick="go('admin')">Hallinta</button>
    <button data-nav="portal" onclick="go('portal')">Oma kohde</button>
  </div>
  <div class="spacer"></div>
  <div class="userchip" id="userchip"></div>
</div>

<div class="layout">
  <aside class="sidebar" id="sidebar">
    <h4>Haku</h4>
    <input id="treeSearch" class="search" placeholder="Hae sijainti tai laite..." oninput="renderTree()" />
    <h4>Sijainnit</h4>
    <div id="tree" class="tree"></div>
  </aside>

  <main class="main">
    <!-- DEVICES -->
    <section id="view-devices" class="view hidden">
      <div class="toolbar">
        <div class="seg">
          <button id="seg-list" class="active" onclick="setDevicesMode('list')">Laitteet</button>
          <button id="seg-sum" onclick="setDevicesMode('sum')">Yhteenveto</button>
        </div>
        <input id="devSearch" class="search" placeholder="Hae laite, tunnus, valmistaja..." oninput="renderDevices()" />
        <select id="devGroup" onchange="renderDevices()"><option value="">Kaikki tuoteryhmät</option></select>
        <select id="devStatus" onchange="renderDevices()">
          <option value="">Kaikki tilat</option>
          <option value="late">Myöhässä</option>
          <option value="soon">Pian (90pv)</option>
          <option value="ok">Kunnossa</option>
        </select>
        <select id="devView" onchange="applySavedView()">
          <option value="">Tallennetut näkymät</option>
        </select>
        <button class="btn ghost sm" onclick="saveCurrentView()">+ Tallenna näkymä</button>
        <span class="spacer" style="flex:1"></span>
        <button class="btn" onclick="openDeviceForm()">+ Uusi laite</button>
      </div>
      <div id="devices-content"></div>
    </section>

    <!-- DEVICE DETAIL -->
    <section id="view-device" class="view hidden">
      <button class="btn ghost sm" onclick="go('devices')">← Takaisin laitelistaan</button>
      <div id="device-detail"></div>
    </section>

    <!-- REPORTS -->
    <section id="view-reports" class="view hidden">
      <h2 style="color:var(--navy);margin:6px 0 14px">Raportit</h2>
      <div class="grid-cards" id="reports-menu"></div>
      <div id="report-content"></div>
    </section>

    <!-- CUSTOMERS -->
    <section id="view-customers" class="view hidden">
      <div class="toolbar">
        <input id="cusSearch" class="search" placeholder="Hae asiakas..." oninput="renderCustomers()" />
        <select id="cusStatus" onchange="renderCustomers()">
          <option value="">Kaikki tilat</option>
          <option value="active">Aktiivinen</option>
          <option value="lead">Liidi</option>
          <option value="inactive">Ei aktiivinen</option>
        </select>
        <span class="spacer" style="flex:1"></span>
        <button class="btn" onclick="openCustomerForm()">+ Uusi asiakas</button>
      </div>
      <div id="customers-content"></div>
    </section>

    <!-- CUSTOMER DETAIL -->
    <section id="view-customer" class="view hidden">
      <button class="btn ghost sm" onclick="go('customers')">← Takaisin asiakaslistaan</button>
      <div id="customer-detail"></div>
    </section>

    <!-- MY WORK -->
    <section id="view-mywork" class="view hidden">
      <h2 style="color:var(--navy);margin:6px 0 14px">Omat työt</h2>
      <div id="mywork-content"></div>
    </section>

    <!-- ASSIGNMENT -->
    <section id="view-assignment" class="view hidden">
      <h2 style="color:var(--navy);margin:6px 0 14px">Työnjako</h2>
      <div id="assignment-content"></div>
    </section>

    <!-- ADMIN -->
    <section id="view-admin" class="view hidden">
      <h2 style="color:var(--navy);margin:6px 0 14px">Hallinta</h2>
      <div id="admin-content"></div>
    </section>

    <!-- CUSTOMER PORTAL -->
    <section id="view-portal" class="view hidden">
      <div id="portal-content"></div>
    </section>
  </main>
</div>
</div>

<!-- Modal -->
<div class="modal-back" id="modal-back">
  <div class="modal" id="modal"></div>
</div>

"use strict";

/* =========================================================
   STORAGE
   ========================================================= */
const KEY = 'servalo_v3';

function loadData(){

}

function applyRole(){
  const u = STATE.currentUser; if(!u) return;
  const role = u.role;
  const show = (n, ok) => { const b = document.querySelector(`button[data-nav="${n}"]`); if(b) b.style.display = ok ? '' : 'none'; };
  // hide all nav initially
  ['devices','reports','assignment','customers','mywork','admin','portal'].forEach(n=>show(n,false));
  if(role==='admin'){
    show('devices',true); show('reports',true); show('assignment',true); show('customers',true); show('mywork',true); show('admin',true);
    $('sidebar').style.display='';
  } else if(role==='supervisor'){
    show('devices',true); show('reports',true); show('assignment',true); show('customers',true); show('mywork',true);
    $('sidebar').style.display='';
  } else if(role==='worker'){
    show('mywork',true); show('devices',true);
    $('sidebar').style.display='';
  } else if(role==='customer'){
    show('portal',true);
    $('sidebar').style.display='none';
  }
}

function renderTree(){
  const q = ($('treeSearch')?.value || '').toLowerCase();
  const c = $('tree');
  const all = [{id:'',name:'Kaikki sijainnit',level:0,parent:null}].concat(DB.locs);
  const counts = {};
  DB.devices.filter(d=>!d.deleted).forEach(d => {
    let cur = DB.locs.find(l=>l.id===d.locId);
    while(cur){ counts[cur.id]=(counts[cur.id]||0)+1; cur = DB.locs.find(l=>l.id===cur.parent); }
    counts['']=(counts['']||0)+1;
  });
  const matched = q ? all.filter(l => (l.name||'').toLowerCase().includes(q)) : all;
  c.innerHTML = matched.map(l => `
    <div class="node lvl-${l.level} ${STATE.selectedLoc===(l.id||null)?'active':''}" onclick="selectLoc('${l.id}')">
      <span>${l.level===1?'🏢 ':l.level===2?'📍 ':l.level===3?'🗺 ':''}${esc(l.name)}</span>
      <span class="count">${counts[l.id||'']||0}</span>
    </div>
  `).join('');
}
function selectLoc(id){
  STATE.selectedLoc = id || null;
  renderTree();
  if(STATE.view==='devices') renderDevices();
}

function descendantsOf(locId){
  const out = new Set();
  if(!locId){ DB.locs.forEach(l => out.add(l.id)); return out; }
  out.add(locId);
  const stack = [locId];
  while(stack.length){
    const cur = stack.pop();
    DB.locs.filter(l => l.parent===cur).forEach(l => { out.add(l.id); stack.push(l.id); });
  }
  return out;
}

function filteredDevices(){
  const q = ($('devSearch')?.value||'').toLowerCase();
  const grp = $('devGroup')?.value||'';
  const st = $('devStatus')?.value||'';
  const locs = descendantsOf(STATE.selectedLoc);
  return DB.devices.filter(d => {
    if(d.deleted) return false;
    if(STATE.selectedLoc && !locs.has(d.locId)) return false;
    if(grp && d.group !== grp) return false;
    if(st==='late' && !isLate(d.next)) return false;
    if(st==='soon' && !within(d.next,90)) return false;
    if(st==='ok' && (isLate(d.next)||within(d.next,90))) return false;
    if(q){
      const hay = (d.idr+' '+d.make+' '+d.group+' '+locName(d.locId)+' '+custName(d.customerId)).toLowerCase();
      if(!hay.includes(q)) return false;
    }
    return true;
  });
}

function statusTag(d){

  if(within(d.next,90)) return '<span class="tag yellow">Pian</span>';
  return '<span class="tag green">Kunnossa</span>';
}

function renderDeviceSummary(){
  const list = filteredDevices();
  const sumValue = list.reduce((s,d)=>s+(+d.value||0),0);
  const openReq = list.reduce((s,d)=>s+(d.requests||[]).filter(r=>r.status==='open').length,0);
  const late = list.filter(d=>isLate(d.next)).length;
  const soon = list.filter(d=>within(d.next,90)).length;
  // donut by group
  const byGroup = {};
  list.forEach(d => byGroup[d.group||'Muu'] = (byGroup[d.group||'Muu']||0)+1);
  const colors = ['#0d9488','#0f2b30','#16a06b','#e2574c','#f6c343','#23618c','#8b5cf6','#fb923c'];
  let acc=0, total=list.length||1;
  const segs = Object.entries(byGroup).map(([k,v],i) => {
    const start=acc/total*360, end=(acc+v)/total*360; acc+=v;
    return {k,v,color:colors[i%colors.length],start,end};
  });
  const conic = segs.map(s => `${s.color} ${s.start}deg ${s.end}deg`).join(', ');

  return `
    <div class="stats">
      <div class="stat"><div class="lbl">Laitteet yhteensä</div><div class="val">${list.length}</div></div>
      <div class="stat"><div class="lbl">Hankinta-arvo</div><div class="val">${fmtEur(sumValue)}</div></div>
      <div class="stat yellow"><div class="lbl">Avoimet pyynnöt</div><div class="val">${openReq}</div></div>

function exportDevicesCSV(){

function openDevice(id){
  STATE.selectedDevice = id;
  STATE.deviceTab = 'laite';
  go('device');
  renderDeviceDetail();
}
function renderDeviceDetail(){
  const d = DB.devices.find(x=>x.id===STATE.selectedDevice); if(!d) return;
  const c = $('device-detail');
  const tabs = [
    {k:'laite', label:'Laite'},
    {k:'files', label:'Tiedostot'},
    {k:'links', label:'Linkitykset'},
    {k:'req', label:'Huoltopyynnöt'},
    {k:'hist', label:'Historiatiedot'},
    {k:'nfc', label:'NFC skannaukset'},
    {k:'cost', label:'Kustannukset'}
  ];
  let body = '';
  if(STATE.deviceTab==='laite'){ body = renderDeviceLaite(d); }
  else if(STATE.deviceTab==='files'){ body = renderDeviceFiles(d); }
  else if(STATE.deviceTab==='links'){ body = renderDeviceLinks(d); }
  else if(STATE.deviceTab==='req'){ body = renderDeviceReq(d); }
  else if(STATE.deviceTab==='hist'){ body = renderDeviceHist(d); }
  else if(STATE.deviceTab==='nfc'){ body = renderDeviceNFC(d); }
  else if(STATE.deviceTab==='cost'){ body = renderDeviceCost(d); }

  c.innerHTML = `

        <small style="color:var(--muted)">${esc(locPath(d.locId))} · ${esc(custName(d.customerId))}</small>

        ${canRole('admin','supervisor')?`<button class="btn ghost sm" onclick="openDeviceForm('${d.id}')">Muokkaa</button>`:''}

function addRequest(id){
  openModal('Uusi huoltopyyntö', `
    <div class="field"><label>Aihe</label><input id="rq-subj"/></div>
    <div class="field"><label>Lisätieto</label><textarea id="rq-det"></textarea></div>
    <button class="btn" onclick="saveRequest('${id}')">Tallenna</button>
  `);
}
function saveRequest(id){
  const d = DB.devices.find(x=>x.id===id);
  d.requests.push({id:uid('r'),date:todayISO(),by:STATE.currentUser.name,subject:$('rq-subj').value,details:$('rq-det').value,status:'open'});
  d.req = (d.requests||[]).filter(r=>r.status==='open').length;
  d.updated=todayISO(); saveData(); closeModal(); renderDeviceDetail();
}
function closeRequest(did,rid){
  const d = DB.devices.find(x=>x.id===did); const r = d.requests.find(x=>x.id===rid); r.status='done'; r.closedAt=todayISO();
  d.req = (d.requests||[]).filter(r=>r.status==='open').length;
  d.updated=todayISO(); saveData(); renderDeviceDetail();
}
function renderDeviceHist(d){
  const all = []
    .concat((d.maintenances||[]).map(x=>({date:x.date,type:'Määräaikaishuolto',by:x.by,note:x.note||''})))
    .concat((d.inspections||[]).map(x=>({date:x.date,type:'Tarkastus',by:x.by,note:x.result||''})))
    .concat((d.repairsLog||[]).map(x=>({date:x.date,type:'Korjaus',by:x.by,note:(x.note||'')+' '+fmtEur(x.cost)})))
    .concat((d.requests||[]).map(x=>({date:x.date,type:'Pyyntö',by:x.by,note:x.subject+' ('+x.status+')'})))
    .sort((a,b)=>new Date(b.date)-new Date(a.date));
  return `<div class="panel"><div class="head">Historia</div><div class="body">
    <table class="tbl"><thead><tr><th>PVM</th><th>Tapahtuma</th><th>Tekijä</th><th>Huomio</th></tr></thead><tbody>
      ${all.map(x => `<tr><td>${fmtDate(x.date)}</td><td>${esc(x.type)}</td><td>${esc(x.by||'')}</td><td>${esc(x.note)}</td></tr>`).join('') || '<tr><td colspan="4" style="color:var(--muted)">Ei historiamerkintöjä.</td></tr>'}
    </tbody></table>
  </div></div>`;
}
function renderDeviceNFC(d){
  return `<div class="panel"><div class="head">NFC-skannaukset</div><div class="body"><div style="color:var(--muted)">Ei skannauksia. Aseta NFC-tarra laitteeseen ja skannaa mobiilisovelluksella.</div></div></div>`;
}
function renderDeviceCost(d){
  const repairCost = (d.repairsLog||[]).reduce((s,x)=>s+(+x.cost||0),0);
  const rental = d.rental ? (d.rentalMonths||0)*(d.rentalMonthly||0) : 0;
  return `<div class="panel"><div class="head">Kustannukset</div><div class="body">
    <div class="stats">
      <div class="stat"><div class="lbl">Hankinta-arvo</div><div class="val">${fmtEur(d.value)}</div></div>
      <div class="stat red"><div class="lbl">Korjaukset</div><div class="val">${fmtEur(repairCost)}</div></div>
      <div class="stat"><div class="lbl">Vuokrasitoumus</div><div class="val">${fmtEur(rental)}</div></div>
      <div class="stat green"><div class="lbl">Yhteensä</div><div class="val">${fmtEur((+d.value||0)+repairCost+rental)}</div></div>
    </div>
  </div></div>`;
}

const REPORTS = [
  {k:'upcoming', name:'Tulevat määräaikaishuollot', icon:'🛠'},
  {k:'inspections', name:'Tulevat tarkastukset', icon:'🔍'},
  {k:'req-open', name:'Avoimet huoltopyynnöt', icon:'📨'},
  {k:'req-done', name:'Valmiit huoltopyynnöt', icon:'✅'},
  {k:'trained', name:'Käyttökoulutetut henkilöt', icon:'👥'},
  {k:'rental', name:'Vuokralaitteet', icon:'📦'},
  {k:'repairs', name:'Eniten korjatut laitteet', icon:'🔧'},
  {k:'deleted', name:'Poistetut laitteet', icon:'🗑'}
];
function renderReportsMenu(){
  $('reports-menu').innerHTML = REPORTS.map(r => `<div class="mini-card" style="cursor:pointer" onclick="openReport('${r.k}')"><h4>${r.icon} ${esc(r.name)}</h4><div style="color:var(--muted);font-size:12px">Avaa raportti</div></div>`).join('');
  $('report-content').innerHTML = '';
}
function openReport(k){
  STATE.currentReport = k;
  const r = REPORTS.find(x=>x.k===k);
  const c = $('report-content');
  const today = todayISO();
  const next90 = addDays(today,90);
  let rows = [], head = [];
  if(k==='upcoming'){
    head = ['Tunnus','Valmistaja','Sijainti','Asiakas','Seuraava huolto','Tila'];
    rows = DB.devices.filter(d=>!d.deleted && !d.isContract).sort((a,b)=>new Date(a.next)-new Date(b.next)).map(d => [d.idr,d.make,locPath(d.locId),custName(d.customerId),fmtDate(d.next), isLate(d.next)?'Myöhässä':within(d.next,90)?'Pian':'Kunnossa']);
  } else if(k==='inspections'){
    head = ['Tunnus','Valmistaja','Sijainti','Asiakas','Viimeisin tarkastus','Tulos'];
    rows = DB.devices.filter(d=>!d.deleted).map(d => { const last=(d.inspections||[]).slice(-1)[0]; return [d.idr,d.make,locPath(d.locId),custName(d.customerId),fmtDate(last?.date),last?.result||'–']; });
  } else if(k==='req-open'){
    head = ['Tunnus','Asiakas','Aihe','Pvm'];
    DB.devices.forEach(d => (d.requests||[]).filter(r=>r.status==='open').forEach(r => rows.push([d.idr,custName(d.customerId),r.subject,fmtDate(r.date)])));
  } else if(k==='req-done'){
    head = ['Tunnus','Asiakas','Aihe','Pvm','Hoidettu'];
    DB.devices.forEach(d => (d.requests||[]).filter(r=>r.status!=='open').forEach(r => rows.push([d.idr,custName(d.customerId),r.subject,fmtDate(r.date),fmtDate(r.closedAt)])));
  } else if(k==='trained'){
    head = ['Tunnus','Sijainti','Henkilö','Pvm'];
    DB.devices.forEach(d => (d.trained||[]).forEach(t => rows.push([d.idr,locPath(d.locId),t.nimi,fmtDate(t.date)])));
  } else if(k==='rental'){
    head = ['Tunnus','Asiakas','Vuokra/kk','Alkupvm','Loppupvm','Kk','Yhteensä'];
    rows = DB.devices.filter(d=>d.rental).map(d => [d.idr,custName(d.customerId),fmtEur(d.rentalMonthly),fmtDate(d.rentalStart),fmtDate(d.rentalEnd),d.rentalMonths,fmtEur((d.rentalMonthly||0)*(d.rentalMonths||0))]);
  } else if(k==='repairs'){
    head = ['Tunnus','Sijainti','Asiakas','Korjauksia','Korjauskulut yhteensä'];
    rows = DB.devices.filter(d=>(d.repairsLog||[]).length>0).sort((a,b)=>(b.repairsLog||[]).length-(a.repairsLog||[]).length).map(d => [d.idr,locPath(d.locId),custName(d.customerId),(d.repairsLog||[]).length,fmtEur((d.repairsLog||[]).reduce((s,x)=>s+(+x.cost||0),0))]);
  } else if(k==='deleted'){
    head = ['Tunnus','Valmistaja','Sijainti','Asiakas','Päivitetty'];
    rows = DB.devices.filter(d=>d.deleted).map(d => [d.idr,d.make,locPath(d.locId),custName(d.customerId),fmtDate(d.updated)]);
  }
  c.innerHTML = `
    <div class="panel">
      <div class="head">${esc(r.name)} <div class="actions">
        <button class="btn ghost sm" onclick="downloadCSV('${r.k}.csv',${JSON.stringify([head]).replaceAll('"','&quot;')}.concat(${JSON.stringify(rows).replaceAll('"','&quot;')}))">Vie CSV</button>
      </div></div>
      <div class="body" style="padding:0">
        <table class="tbl"><thead><tr>${head.map(h=>`<th>${esc(h)}</th>`).join('')}</tr></thead>
        <tbody>${rows.map(r => `<tr>${r.map(x=>`<td>${esc(x)}</td>`).join('')}</tr>`).join('') || `<tr><td colspan="${head.length}" style="color:var(--muted);text-align:center;padding:18px">Ei rivejä.</td></tr>`}</tbody></table>
      </div>
    </div>
  `;
}

function saveCustomer(id){
  let c;
  if(id){ c = DB.customers.find(x=>x.id===id); }
  else { c = {id:uid('cu'),contacts:[],created:todayISO()}; DB.customers.push(c); }
  c.name=$('cf-name').value; c.biz=$('cf-biz').value; c.contact=$('cf-contact').value;
  c.email=$('cf-email').value; c.phone=$('cf-phone').value; c.status=$('cf-status').value;
  c.address=$('cf-address').value; c.notes=$('cf-notes').value;
  const existing = c.contacts||[];
  const rows = $('cf-contacts').querySelectorAll('[data-contact]');
  const newList = [];
  rows.forEach((r,i) => {
    const data = {};
    r.querySelectorAll('[data-co]').forEach(inp => data[inp.dataset.co] = inp.value);
    if(!data.nimi) return;
    const e = existing[i];
    newList.push(Object.assign({id:e?.id||uid('co'),invited:e?.invited||false,userId:e?.userId||null}, data));
  });
  c.contacts = newList;
  saveData(); closeModal(); renderCustomers(); if(STATE.view==='customer') renderCustomerDetail();
}

    <div class="stats">${workers.map(w => `<div class="stat"><div class="lbl">${esc(w.name)}</div><div class="val">${load[w.id].length}</div><small style="color:var(--muted)">${load[w.id].filter(d=>isLate(d.next)).length} myöhässä</small></div>`).join('')}</div>
    <div class="panel"><div class="head">Työnjako</div><div class="body" style="padding:0">
      <table class="tbl"><thead><tr><th>Tunnus</th><th>Sijainti</th><th>Asiakas</th><th>Seur. huolto</th><th>Vastuuhenkilö</th></tr></thead><tbody>
        ${DB.devices.filter(d=>!d.deleted).map(d => `<tr><td><b>${esc(d.idr)}</b></td><td>${esc(locPath(d.locId))}</td><td>${esc(custName(d.customerId))}</td><td>${fmtDate(d.next)} ${statusTag(d)}</td>
          <td><select onchange="assignDevice('${d.id}',this.value)">${['',...workers.map(w=>w.id)].map(id => `<option value="${id}" ${d.assignedTo===id?'selected':''}>${id?esc(workers.find(w=>w.id===id).name):'– ei valittu –'}</option>`).join('')}</select></td></tr>`).join('')}
      </tbody></table>
    </div></div>
  `;
}
function assignDevice(did, uid){
  const d = DB.devices.find(x=>x.id===did); d.assignedTo = uid; d.updated = todayISO(); saveData();
}

/* =========================================================
   ADMIN
   ========================================================= */

  $('admin-content').innerHTML = `
    <div class="panel"><div class="head">Käyttäjät <button class="btn ghost sm" onclick="addUser()">+ Uusi käyttäjä</button></div><div class="body" style="padding:0">
      <table class="tbl"><thead><tr><th>Nimi</th><th>Rooli</th><th>Sähköposti</th><th>Aktiivinen</th><th></th></tr></thead><tbody>
        ${DB.users.map(u => `<tr><td>${esc(u.name)}${u.customerId?` <small style="color:var(--muted)">(${esc(custName(u.customerId))})</small>`:''}</td>
          <td><select onchange="updateUser('${u.id}','role',this.value)"><option value="admin" ${u.role==='admin'?'selected':''}>Pääkäyttäjä</option><option value="supervisor" ${u.role==='supervisor'?'selected':''}>Työnjohtaja</option><option value="worker" ${u.role==='worker'?'selected':''}>Asentaja</option><option value="customer" ${u.role==='customer'?'selected':''}>Asiakas</option></select></td>
          <td>${esc(u.email||'')}</td>
          <td><input type="checkbox" ${u.active?'checked':''} onchange="updateUser('${u.id}','active',this.checked)"/></td>

        </tr>`).join('')}

    </div></div>

    <div class="panel"><div class="head">Yritysasetukset</div><div class="body">
      <div class="form-row"><div class="field"><label>Yrityksen nimi</label><input value="${esc(s.company.name)}" onchange="s_company('name',this.value)"/></div>
        <div class="field"><label>Sähköposti</label><input value="${esc(s.company.email)}" onchange="s_company('email',this.value)"/></div></div>
      <div class="form-row"><div class="field"><label>Puhelin</label><input value="${esc(s.company.phone)}" onchange="s_company('phone',this.value)"/></div>
        <div class="field"><label>Verkkosivut</label><input value="${esc(s.company.web)}" onchange="s_company('web',this.value)"/></div></div>
    </div></div>

    <div class="panel"><div class="head">Tuoteryhmät</div><div class="body">
      ${s.groups.map((g,i) => `<span class="tag" style="margin:3px;padding:6px 12px">${esc(g)} <button onclick="removeGroup(${i})" style="background:none;border:0;color:var(--red);cursor:pointer;margin-left:6px">✕</button></span>`).join('')}
      <div class="form-row" style="margin-top:10px"><div class="field"><label>Lisää tuoteryhmä</label><input id="ng-name"/></div><div class="field" style="display:flex;align-items:flex-end"><button class="btn sm" onclick="addGroup()">Lisää</button></div></div>
    </div></div>

    <div class="panel"><div class="head">Huoltovälit (kk)</div><div class="body">
      ${s.intervals.map((n,i) => `<span class="tag" style="margin:3px;padding:6px 12px">${n} kk <button onclick="removeInterval(${i})" style="background:none;border:0;color:var(--red);cursor:pointer;margin-left:6px">✕</button></span>`).join('')}

    </div></div>
  `;
}
function s_company(k,v){ DB.settings.company[k]=v; saveData(); }
function addGroup(){ const v=$('ng-name').value.trim(); if(v){ DB.settings.groups.push(v); saveData(); renderAdmin(); } }
function removeGroup(i){ DB.settings.groups.splice(i,1); saveData(); renderAdmin(); }
function addInterval(){ const v=+$('ni-n').value; if(v>0){ DB.settings.intervals.push(v); DB.settings.intervals.sort((a,b)=>a-b); saveData(); renderAdmin(); } }
function removeInterval(i){ DB.settings.intervals.splice(i,1); saveData(); renderAdmin(); }
function updateUser(id,k,v){ const u = DB.users.find(x=>x.id===id); u[k]=v; saveData(); }
function removeUser(id){ if(!confirm('Poista käyttäjä?')) return; DB.users = DB.users.filter(u=>u.id!==id); saveData(); renderAdmin(); }
function addUser(){
  openModal('Uusi käyttäjä', `
    <div class="form-row"><div class="field"><label>Nimi</label><input id="nu-name"/></div>
      <div class="field"><label>Rooli</label><select id="nu-role"><option value="worker">Asentaja</option><option value="supervisor">Työnjohtaja</option><option value="admin">Pääkäyttäjä</option></select></div></div>
    <div class="field"><label>Sähköposti</label><input id="nu-email"/></div>
    <button class="btn" onclick="saveNewUser()">Tallenna</button>`);
}
function saveNewUser(){
  DB.users.push({id:uid('u'),name:$('nu-name').value,role:$('nu-role').value,email:$('nu-email').value,active:true});
  saveData(); closeModal(); renderAdmin();
}

/* =========================================================
   CUSTOMER PORTAL
   ========================================================= */
function renderPortal(){
  const u = STATE.currentUser;
  if(u.role !== 'customer'){ $('portal-content').innerHTML = '<div class="alert">Vain asiakaskäyttäjille.</div>'; return; }
  const cust = DB.customers.find(c=>c.id===u.customerId);
  const devs = DB.devices.filter(d=>d.customerId===u.customerId && !d.deleted);
  const late = devs.filter(d=>isLate(d.next));
  const soon = devs.filter(d=>within(d.next,90) && !isLate(d.next));
  const reqs = [];
  devs.forEach(d => (d.requests||[]).filter(r=>r.status==='open').forEach(r => reqs.push({d,r})));
  $('portal-content').innerHTML = `
    <div style="margin:12px 0"><h2 style="margin:0;color:var(--navy)">${esc(cust?.name||'Kohde')}</h2><small style="color:var(--muted)">${esc(cust?.address||'')}</small></div>
    <div class="panel"><div class="head">Huoltoyhtiön yhteystiedot</div><div class="body"><div class="kv">
      <div class="row"><b>Yritys</b><span>${esc(DB.settings.company.name)}</span></div>
      <div class="row"><b>Puhelin</b><span>${esc(DB.settings.company.phone)}</span></div>
      <div class="row"><b>Sähköposti</b><span>${esc(DB.settings.company.email)}</span></div>
    </div></div></div>
    <div class="stats">
      <div class="stat red"><div class="lbl">Myöhässä olevat huollot</div><div class="val">${late.length}</div></div>
      <div class="stat yellow"><div class="lbl">Tulevat 90 pv</div><div class="val">${soon.length}</div></div>
      <div class="stat"><div class="lbl">Avoimet pyynnöt</div><div class="val">${reqs.length}</div></div>
    </div>

    <div class="panel"><div class="head">Laitteeni (vain luku)</div><div class="body" style="padding:0">
      <table class="tbl"><thead><tr><th>Tunnus</th><th>Valmistaja</th><th>Sijainti</th><th>Seuraava huolto</th><th>Tila</th><th></th></tr></thead>
      <tbody>${devs.map(d => `<tr><td><b>${esc(d.idr)}</b></td><td>${esc(d.make)}</td><td>${esc(locPath(d.locId))}</td><td>${fmtDate(d.next)}</td><td>${statusTag(d)}</td><td><button class="btn ghost sm" onclick="portalRequest('${d.id}')">Tee huoltopyyntö</button></td></tr>`).join('')}</tbody></table>
    </div></div>

    <div class="panel"><div class="head">Tulevat huollot</div><div class="body">
      ${devs.filter(d=>within(d.next,180)).sort((a,b)=>new Date(a.next)-new Date(b.next)).map(d => `<div class="row" style="padding:6px 0;border-bottom:1px solid var(--line);display:flex;justify-content:space-between"><span><b>${esc(d.idr)}</b> ${esc(d.make)} <small style="color:var(--muted)">${esc(locPath(d.locId))}</small></span><span>${fmtDate(d.next)} ${statusTag(d)}</span></div>`).join('') || '<div style="color:var(--muted)">Ei tulevia huoltoja.</div>'}
    </div></div>

    <div class="panel"><div class="head">Omat huoltopyynnöt</div><div class="body">
      ${reqs.length? reqs.map(({d,r}) => `<div class="row" style="padding:6px 0;border-bottom:1px solid var(--line)"><b>${esc(d.idr)}</b> – ${esc(r.subject)} <span class="tag yellow">Käsittelyssä</span><div style="color:var(--muted);font-size:12px">${esc(r.details||'')}</div></div>`).join('') : '<div style="color:var(--muted)">Ei avoimia pyyntöjä.</div>'}
    </div></div>

    <div class="panel"><div class="head">Tee huoltopyyntö</div><div class="body">
      <div class="form-row">
        <div class="field"><label>Laite</label><select id="pr-dev">${devs.map(d => `<option value="${d.id}">${esc(d.idr)} – ${esc(d.make)}</option>`).join('')}</select></div>
        <div class="field"><label>Aihe</label><input id="pr-subj"/></div>
      </div>
      <div class="field"><label>Lisätieto</label><textarea id="pr-det"></textarea></div>
      <button class="btn" onclick="submitPortalRequest()">Lähetä pyyntö</button>
    </div></div>

    <div class="panel"><div class="head">Raportit</div><div class="body">
      <div class="grid-cards">
        ${portalReportCard('Laiteluettelo', 'devices')}
        ${portalReportCard('Tulevat määräaikaishuollot', 'upcoming')}
        ${portalReportCard('Tulevat tarkastukset', 'inspections')}
        ${portalReportCard('Huoltopyynnöt', 'reqs')}
        ${portalReportCard('Käyttökoulutetut henkilöt', 'trained')}
        <div class="mini-card"><h4>🖨 Tulostettava huoltoraportti</h4><div style="color:var(--muted);font-size:12px;margin-bottom:8px">Avaa siisti tulostusnäkymä uuteen ikkunaan.</div><button class="btn sm" onclick="printPortalReport()">Avaa</button></div>
      </div>
    </div></div>
  `;

function portalReportCard(name, k){
  return `<div class="mini-card"><h4>📊 ${esc(name)}</h4><div style="color:var(--muted);font-size:12px;margin-bottom:8px">Lataa CSV (Excel-yhteensopiva)</div><button class="btn sm" onclick="portalCSV('${k}')">Lataa CSV</button></div>`;
}
function portalRequest(did){
  $('pr-dev').value = did;
  $('pr-subj').focus();
}
function submitPortalRequest(){
  const d = DB.devices.find(x=>x.id===$('pr-dev').value);
  d.requests.push({id:uid('r'),date:todayISO(),by:STATE.currentUser.name,subject:$('pr-subj').value,details:$('pr-det').value,status:'open'});
  d.req = (d.requests||[]).filter(r=>r.status==='open').length;
  d.updated=todayISO(); saveData();
  $('pr-subj').value=''; $('pr-det').value='';
  renderPortal();
  alert('Pyyntö lähetetty huoltoyhtiölle.');
}
function portalCSV(k){
  const cid = STATE.currentUser.customerId;
  const devs = DB.devices.filter(d=>d.customerId===cid && !d.deleted);
  let head=[], rows=[];
  if(k==='devices'){
    head=['Tunnus','Valmistaja','Sijainti','Seuraava huolto','Hankinta-arvo'];
    rows = devs.map(d => [d.idr,d.make,locPath(d.locId),fmtDate(d.next),d.value]);
  } else if(k==='upcoming'){
    head=['Tunnus','Sijainti','Seuraava huolto','Tila'];
    rows = devs.filter(d=>!d.isContract).sort((a,b)=>new Date(a.next)-new Date(b.next)).map(d => [d.idr,locPath(d.locId),fmtDate(d.next),isLate(d.next)?'Myöhässä':within(d.next,90)?'Pian':'Kunnossa']);
  } else if(k==='inspections'){
    head=['Tunnus','Sijainti','Viimeisin tarkastus','Tulos'];
    rows = devs.map(d => { const last=(d.inspections||[]).slice(-1)[0]; return [d.idr,locPath(d.locId),fmtDate(last?.date),last?.result||'–']; });
  } else if(k==='reqs'){
    head=['Tunnus','Aihe','Pvm','Tila'];
    devs.forEach(d => (d.requests||[]).forEach(r => rows.push([d.idr,r.subject,fmtDate(r.date),r.status==='open'?'Avoin':'Hoidettu'])));
  } else if(k==='trained'){
    head=['Tunnus','Sijainti','Henkilö','Pvm'];
    devs.forEach(d => (d.trained||[]).forEach(t => rows.push([d.idr,locPath(d.locId),t.nimi,fmtDate(t.date)])));
  }
  downloadCSV(k+'.csv', [head, ...rows]);
}

  </style></head><body>

    <div style="text-align:right"><b>${esc(DB.settings.company.name)}</b><br/><small>${esc(DB.settings.company.phone)} · ${esc(DB.settings.company.email)}</small></div>

  <p>Raportti tulostettu: ${fmtDate(todayISO())}</p>

    ${devs.map(d => `<tr><td>${esc(d.idr)}</td><td>${esc(d.make)}</td><td>${esc(locPath(d.locId))}</td><td class="${isLate(d.next)?'late':''}">${fmtDate(d.next)}</td><td>${isLate(d.next)?'<span class="late">MYÖHÄSSÄ</span>':within(d.next,90)?'Tulossa':'Kunnossa'}</td></tr>`).join('')}

    ${devs.flatMap(d=>(d.requests||[]).filter(r=>r.status==='open').map(r=>`<tr><td>${esc(d.idr)}</td><td>${esc(r.subject)}</td><td>${fmtDate(r.date)}</td></tr>`)).join('') || '<tr><td colspan="3">Ei avoimia pyyntöjä.</td></tr>'}
  </tbody></table>
  <div class="footer">${esc(DB.settings.company.name)} · ${esc(DB.settings.company.web)} · ${esc(DB.settings.company.email)} · ${esc(DB.settings.company.phone)}</div>
  <button onclick="window.print()" style="margin-top:14px;background:#0d9488;color:#fff;border:0;padding:10px 18px;border-radius:8px;font-weight:700;cursor:pointer">Tulosta / Tallenna PDF</button>
  </body></html>`;
  const w = window.open('','_blank'); w.document.write(html); w.document.close();

/* =========================================================
   MODAL / CSV
   ========================================================= */
function openModal(title, body){
  $('modal').innerHTML = `<button class="close" onclick="closeModal()">×</button><h3>${esc(title)}</h3>${body}`;
  $('modal-back').classList.add('open');
}
function closeModal(){ $('modal-back').classList.remove('open'); }
$('modal-back')?.addEventListener('click', e => { if(e.target.id==='modal-back') closeModal(); });

function downloadCSV(filename, rows){
  const csv = rows.map(r => r.map(c => {
    const s = String(c==null?'':c);
    if(/[;"\n]/.test(s)) return '"'+s.replace(/"/g,'""')+'"';
    return s;
  }).join(';')).join('\n');
  const blob = new Blob(['﻿'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = filename; document.body.appendChild(a); a.click(); a.remove();
}

/* =========================================================
   LOOKUPS
   ========================================================= */
function custName(id){ return DB.customers.find(c=>c.id===id)?.name || '–'; }
function userName(id){ return DB.users.find(u=>u.id===id)?.name || '–'; }
function locName(id){ return DB.locs.find(l=>l.id===id)?.name || '–'; }
function locPath(id){
  const parts = []; let cur = DB.locs.find(l=>l.id===id);
  while(cur){ parts.unshift(cur.name); cur = DB.locs.find(l=>l.id===cur.parent); }
  return parts.join(' / ');
}

/* =========================================================
   BOOT
   ========================================================= */
function bootApp(){
  $('view-login').classList.add('hidden');
  $('app').classList.remove('hidden');
  renderUserChip();
  applyRole();
  renderTree();
  // default landing per role
  if(STATE.currentUser.role==='customer') go('portal');
  else if(STATE.currentUser.role==='worker') go('mywork');
  else go('devices');
}

const savedUserId = loadUser();
if(savedUserId){
  STATE.currentUser = DB.users.find(u=>u.id===savedUserId);
  if(STATE.currentUser && STATE.currentUser.active){ bootApp(); }
  else { setUser(null); $('view-login').classList.remove('hidden'); renderLogin(); }
} else {
  $('view-login').classList.remove('hidden');
  renderLogin();
}
